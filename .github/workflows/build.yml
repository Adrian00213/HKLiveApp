name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          cd HKLive
          npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build debug APK
        run: |
          cd HKLive
          npx expo prebuild --platform android
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HKLive-debug-APK
          path: HKLive/android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd HKLive
          npm install

      - name: Setup iOS
        run: |
          cd HKLive
          npx expo prebuild --platform ios
          cd ios
          pod install

      - name: Build iOS
        run: |
          cd HKLive/ios
          xcodebuild -workspace *.xcworkspace -scheme app -configuration Release -archivePath build/app.xcarchive archive

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: HKLive-ios-IPA
          path: HKLive/ios/build/app.xcarchive
